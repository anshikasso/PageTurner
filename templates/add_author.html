{% extends 'base.html' %}
{% block title %}Add Author{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1>➕ Add New Author</h1>
        <a href="{{ url_for('authors') }}" class="btn btn-outline">← Back</a>
    </div>
</div>
<div class="container form-page">
    <form method="POST" class="styled-form">
        <div class="form-section">
            <h3>Author Details</h3>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" placeholder="Author full name" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="author@email.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" placeholder="Phone number">
                </div>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">Add Author</button>
            <a href="{{ url_for('authors') }}" class="btn btn-outline btn-lg">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
