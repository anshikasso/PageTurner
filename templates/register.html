{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container auth-container-wide">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <span class="auth-icon">✨</span>
            <h2>Create Account</h2>
            <p>Join PageTurner today</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Last name" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="10-digit number" pattern="[0-9]{10}">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
            </div>
            <h4 class="form-section-title">Address</h4>
            <div class="form-row">
                <div class="form-group">
                    <label>House Number</label>
                    <input type="text" name="house_number" placeholder="House/Flat No.">
                </div>
                <div class="form-group">
                    <label>Street</label>
                    <input type="text" name="street" placeholder="Street name">
                </div>
            </div>
            <div class="form-row form-row-3">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" placeholder="City">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" name="state" placeholder="State">
                </div>
                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" name="pincode" placeholder="6-digit pincode" pattern="[0-9]{6}">
                </div>
            </div>
            <h4 class="form-section-title">Login Credentials</h4>
            <div class="form-row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min 6 characters" minlength="6" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
